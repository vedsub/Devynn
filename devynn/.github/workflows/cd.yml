name: CD
on:
  push: {branches: [main]}
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/devynn:${{ github.sha }} .
          docker tag ${{ steps.ecr.outputs.registry }}/devynn:${{ github.sha }} ${{ steps.ecr.outputs.registry }}/devynn:latest
          docker push ${{ steps.ecr.outputs.registry }}/devynn:${{ github.sha }}
          docker push ${{ steps.ecr.outputs.registry }}/devynn:latest
      - run: |
          aws ecs update-service --cluster devynn-prod --service devynn-app --force-new-deployment
          aws ecs wait services-stable --cluster devynn-prod --services devynn-app
      - name: Smoke test
        run: curl -sf ${{ secrets.PROD_URL }}/health | python -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d['status']=='ok' else 1)"
      - name: Slack on failure
        if: failure()
        run: curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} -d '{"text":"❌ Devynn deploy failed: ${{ github.sha }}"}'
